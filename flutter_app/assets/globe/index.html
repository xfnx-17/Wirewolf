<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #060d1f; }
  #c { width: 100vw; height: 100vh; display: block; cursor: grab; }
  #c:active { cursor: grabbing; }
  #zc { position: fixed; right: 14px; bottom: 14px; display: flex; flex-direction: column; gap: 6px; z-index: 5; }
  #zc button { width: 34px; height: 34px; border-radius: 8px; border: 1px solid rgba(86,170,225,0.4);
    background: rgba(10,20,40,0.82); color: #cfe6ff; font: 600 19px/1 -apple-system, system-ui, sans-serif;
    cursor: pointer; padding: 0; }
  #zc button:hover { background: rgba(24,46,78,0.95); }
  #zc button:active { transform: translateY(1px); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="zc"><button id="zin" title="Zoom in">+</button><button id="zout" title="Zoom out">&#8722;</button></div>
<script src="world.js"></script>
<script>
const HOME = { lat: 4.60, lng: 101.09 }; // Perak, MY (monitored site)
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let DPR = Math.min(window.devicePixelRatio || 1, 2);

// palette (Atlas-style dark map)
const C = {
  ocean: '#060d1f',
  grat: 'rgba(45,95,150,0.10)',
  land: '#11294a',
  border: 'rgba(86,170,225,0.55)',
  home: '#36e0ff',
};

let W = 0, H = 0, MW = 0, MH = 0, OX = 0, OY = 0;
let Z = 1, PX = 0, PY = 0; // zoom + pan (screen px)
let base = document.createElement('canvas');

function layout() {
  W = canvas.clientWidth; H = canvas.clientHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  if (W / H >= 2) { MH = H; MW = H * 2; } else { MW = W; MH = W / 2; }
  OX = (W - MW) / 2; OY = (H - MH) / 2;
  renderBase();
}
function proj(lng, lat) {
  const wx = OX + (lng + 180) / 360 * MW;
  const wy = OY + (90 - lat) / 180 * MH;
  const fx = W / 2, fy = H / 2;
  return [(wx - fx) * Z + fx + PX, (wy - fy) * Z + fy + PY];
}

function renderBase() {
  base.width = canvas.width; base.height = canvas.height;
  const b = base.getContext('2d');
  b.setTransform(DPR, 0, 0, DPR, 0, 0);
  b.clearRect(0, 0, W, H);
  b.fillStyle = C.ocean; b.fillRect(0, 0, W, H);

  // graticule
  b.strokeStyle = C.grat; b.lineWidth = 1;
  for (let lng = -180; lng <= 180; lng += 30) {
    b.beginPath(); const a = proj(lng, -85), z = proj(lng, 85);
    b.moveTo(a[0], a[1]); b.lineTo(z[0], z[1]); b.stroke();
  }
  for (let lat = -60; lat <= 60; lat += 30) {
    b.beginPath(); const a = proj(-180, lat), z = proj(180, lat);
    b.moveTo(a[0], a[1]); b.lineTo(z[0], z[1]); b.stroke();
  }

  // countries
  if (window.WORLD_GEO) {
    b.lineWidth = 0.8;
    b.strokeStyle = C.border;
    b.fillStyle = C.land;
    b.shadowBlur = 0; // kept off so zoom/pan re-renders stay smooth
    for (const f of window.WORLD_GEO.features) {
      const g = f.geometry; if (!g) continue;
      const polys = g.type === 'Polygon' ? [g.coordinates] : (g.type === 'MultiPolygon' ? g.coordinates : []);
      for (const poly of polys) {
        b.beginPath();
        for (const ring of poly) {
          for (let i = 0; i < ring.length; i++) {
            const p = proj(ring[i][0], ring[i][1]);
            if (i === 0) b.moveTo(p[0], p[1]); else b.lineTo(p[0], p[1]);
          }
          b.closePath();
        }
        b.fill(); b.stroke();
      }
    }
    b.shadowBlur = 0;
  }
}

// ---- attacker/victim graph bridge ----
const ATK = '#e23d57'; // attacker (source) = red
const TGT = '#36a3ff'; // victim (target)   = blue
let NODES = [], EDGES = [];
window.setMarkers = function (json) {
  let g; try { g = JSON.parse(json); } catch (e) { return; }
  NODES = (g.nodes || []).map(function (n) {
    return { lat: n.lat, lng: n.lng, place: n.place || '', ip: n.ip || '',
             atk: !!n.atk, tgt: !!n.tgt, phase: Math.random() };
  });
  EDGES = (g.edges || []).map(function (e) {
    return { sLat: e.sLat, sLng: e.sLng, dLat: e.dLat, dLng: e.dLng,
             color: '#' + ('000000' + ((e.color >>> 0)).toString(16)).slice(-6),
             phase: Math.random(), speed: 0.3 + Math.random() * 0.25 };
  });
};

function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
}

// Arc from attacker (source) to victim (destination); pulse travels src->dst.
function drawEdge(now, e) {
  const s = proj(e.sLng, e.sLat), d = proj(e.dLng, e.dLat);
  const dx = d[0] - s[0], dy = d[1] - s[1];
  const dist = Math.hypot(dx, dy);
  if (dist < 2) return; // same location (e.g. internal->internal)
  const mx = (s[0] + d[0]) / 2, my = (s[1] + d[1]) / 2;
  const cx = mx - dy * 0.18, cy = my + dx * 0.18 - dist * 0.12;
  ctx.lineWidth = 1.3; ctx.strokeStyle = hexA(e.color, 0.5);
  ctx.shadowColor = e.color; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.moveTo(s[0], s[1]); ctx.quadraticCurveTo(cx, cy, d[0], d[1]); ctx.stroke();
  ctx.shadowBlur = 0;
  const t = ((now / 1000) * e.speed + e.phase) % 1, it = 1 - t;
  const px = it * it * s[0] + 2 * it * t * cx + t * t * d[0];
  const py = it * it * s[1] + 2 * it * t * cy + t * t * d[1];
  ctx.fillStyle = '#fff'; ctx.shadowColor = e.color; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(px, py, 2.4, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

// Node coloured by role: attacker=red, victim=blue, both=red core + blue ring.
function drawNode(now, n) {
  const p = proj(n.lng, n.lat);
  const core = n.atk ? ATK : TGT;
  const pulse = (now / 1000 + n.phase) % 1.6 / 1.6;
  ctx.strokeStyle = hexA(core, 0.55 * (1 - pulse)); ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(p[0], p[1], 4 + pulse * 12, 0, Math.PI * 2); ctx.stroke();
  if (n.atk && n.tgt) { // dual role — blue ring around red core
    ctx.strokeStyle = TGT; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p[0], p[1], 6, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.fillStyle = core; ctx.shadowColor = core; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(p[0], p[1], 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  const lx = p[0] + 9;
  ctx.textBaseline = 'middle'; ctx.lineJoin = 'round'; ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(6,13,31,0.92)';
  ctx.font = '600 11.5px -apple-system, system-ui, sans-serif';
  if (n.place) { ctx.strokeText(n.place, lx, p[1] - 5); ctx.fillStyle = '#e3edff'; ctx.fillText(n.place, lx, p[1] - 5); }
  ctx.font = '500 10px ui-monospace, monospace';
  if (n.ip) { ctx.strokeText(n.ip, lx, p[1] + 8); ctx.fillStyle = 'rgba(150,180,220,0.85)'; ctx.fillText(n.ip, lx, p[1] + 8); }
}

function frame(now) {
  requestAnimationFrame(frame);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(base, 0, 0, W, H);
  for (const e of EDGES) drawEdge(now, e);
  for (const n of NODES) drawNode(now, n);
}

function clampPan() {
  const maxX = Math.max(0, (MW * Z - W) / 2) + 60;
  const maxY = Math.max(0, (MH * Z - H) / 2) + 60;
  PX = Math.max(-maxX, Math.min(maxX, PX));
  PY = Math.max(-maxY, Math.min(maxY, PY));
}

function zoomAt(factor, cx, cy) {
  const fx = W / 2, fy = H / 2, oldZ = Z;
  Z = Math.max(1, Math.min(8, Z * factor));
  // keep the focal point fixed while zooming
  const wx = (cx - fx - PX) / oldZ + fx;
  const wy = (cy - fy - PY) / oldZ + fy;
  PX = cx - fx - (wx - fx) * Z;
  PY = cy - fy - (wy - fy) * Z;
  if (Z === 1) { PX = 0; PY = 0; }
  clampPan(); renderBase();
}
canvas.addEventListener('wheel', function (e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  zoomAt(e.deltaY < 0 ? 1.15 : 1 / 1.15, e.clientX - rect.left, e.clientY - rect.top);
}, { passive: false });
canvas.addEventListener('dblclick', function (e) {
  const rect = canvas.getBoundingClientRect();
  zoomAt(1.5, e.clientX - rect.left, e.clientY - rect.top);
});
document.getElementById('zin').addEventListener('click', function () { zoomAt(1.4, W / 2, H / 2); });
document.getElementById('zout').addEventListener('click', function () { zoomAt(1 / 1.4, W / 2, H / 2); });

let dragging = false, lx = 0, ly = 0;
canvas.addEventListener('pointerdown', function (e) {
  dragging = true; lx = e.clientX; ly = e.clientY;
  try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
});
canvas.addEventListener('pointerup', function (e) {
  dragging = false; try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
});
canvas.addEventListener('pointermove', function (e) {
  if (!dragging) return;
  PX += (e.clientX - lx); PY += (e.clientY - ly);
  lx = e.clientX; ly = e.clientY;
  clampPan(); renderBase();
});

window.addEventListener('resize', layout);
layout();
requestAnimationFrame(frame);
window.__globeReady = true;
</script>
</body>
</html>
