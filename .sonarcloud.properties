# SonarCloud Automatic Analysis scope.
# Excluded: vendored/generated/bundled content that isn't Wirewolf product code.
#   gui/fonts          - vendored IconsFontAwesome6.h (third-party header)
#   flutter_app/assets - bundled data & embedded viz page (globe, geo tables)
#   flutter_app/windows- Flutter template scaffolding + generated registrants
#   models             - dev scripts that synthesize training data (np.random
#                        is deliberate and not security-sensitive)
#   tool/*.mjs         - local dev generators seeded with demo/example IPs
sonar.exclusions=gui/fonts/**, flutter_app/assets/**, flutter_app/windows/**, models/**, tool/*.mjs
