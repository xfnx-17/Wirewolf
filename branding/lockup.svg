<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72">
  <!-- Wirewolf — horizontal lockup. The wordmark sits on the wire; text inherits currentColor so it works on any ground. -->
  <polyline points="4,56 10,56 13,50 16,56 22,56 30,26 33,10 38,24 41,24 45,11 50,26 55,30 64,38 64,46 58,47 46,56 356,56"
    fill="none" stroke="#FFAD33" stroke-width="4.5"
    stroke-linecap="square" stroke-linejoin="miter"/>
  <rect x="48" y="30.5" width="4" height="4" fill="#FFAD33"/>
  <text x="86" y="50" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="30" letter-spacing="3.5" fill="currentColor"><tspan font-weight="300">WIRE</tspan><tspan font-weight="900">WOLF</tspan></text>
</svg>
